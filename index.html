<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hamlet Music Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Hamlet</p>
        <h1>Music Board</h1>
      </div>
      <button id="stopAll" class="stop-all" type="button">STOP ALL</button>
    </header>

    <main class="page">
      <section class="status" aria-label="Playback status">
        <span>Now playing</span>
        <strong id="nowPlaying">Nothing</strong>
      </section>

      <section class="controls" aria-label="Sound controls">
        <button id="loadSounds" type="button">Load sounds</button>
        <label>
          <span>Volume</span>
          <input id="masterVolume" type="range" min="0" max="100" value="85">
          <output id="masterOutput">85%</output>
        </label>
      </section>

      <section class="song-list" id="songList" aria-label="Song list"></section>
    </main>

    <template id="songTemplate">
      <article class="song-row">
        <div class="song-info">
          <strong class="song-title"></strong>
          <small class="song-note"></small>
        </div>
        <div class="song-actions">
          <button class="play-button" type="button">Play</button>
          <button class="fade-button" type="button">Fade out</button>
        </div>
      </article>
    </template>

    <script src="show-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
