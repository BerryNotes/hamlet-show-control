<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hamlet Music Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Hamlet</p>
        <h1>Music Board</h1>
      </div>
      <button id="stopAll" class="stop-all" type="button">STOP ALL</button>
    </header>

    <main class="page">
      <section class="board" aria-label="Song board">
        <section class="status" aria-label="Playback status">
          <span>Now playing</span>
          <strong id="nowPlaying">Nothing</strong>
        </section>

        <section class="controls" aria-label="Sound controls">
          <button id="loadSounds" type="button">Load sounds</button>
          <label>
            <span>Volume</span>
            <input id="masterVolume" type="range" min="0" max="100" value="85">
            <output id="masterOutput">85%</output>
          </label>
        </section>

        <section class="song-list" id="songList" aria-label="Song list"></section>
      </section>

      <aside class="mixer" aria-label="Live mixer">
        <h2>Mixer</h2>
        <p id="emptyMixer" class="empty-mixer">No sounds playing</p>
        <section id="mixerList" class="mixer-list"></section>
      </aside>
    </main>

    <template id="songTemplate">
      <article class="song-row">
        <div class="song-info">
          <strong class="song-title"></strong>
        </div>
        <div class="song-actions">
          <button class="play-button" type="button">Play</button>
          <button class="fade-in-button" type="button">Fade in</button>
          <button class="loop-button" type="button" aria-pressed="false">Loop</button>
          <button class="fade-button" type="button">Fade out</button>
          <button class="stop-button" type="button">Stop</button>
        </div>
      </article>
    </template>

    <template id="mixerTemplate">
      <article class="mixer-row">
        <strong class="mixer-title"></strong>
        <div class="duration">
          <div class="duration-bar" role="slider" tabindex="0" aria-label="Track position" aria-valuemin="0" aria-valuemax="1000" aria-valuenow="0">
            <span class="duration-fill"></span>
            <span class="duration-handle"></span>
          </div>
          <span class="duration-time">0:00 / 0:00</span>
        </div>
        <label>
          <span>Volume</span>
          <input class="mixer-volume" type="range" min="0" max="100" value="0">
          <output class="mixer-output">0%</output>
        </label>
      </article>
    </template>

    <script src="show-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
