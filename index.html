<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hamlet Music Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Hamlet <span id="version" class="version"></span></p>
        <h1>Music Board</h1>
      </div>
      <button id="stopAll" class="stop-all" type="button">STOP ALL</button>
    </header>

    <main class="page">
      <aside class="cue-panel" aria-label="Cue list">
        <header class="cue-panel-header">
          <h2>Cues</h2>
          <button id="loadSounds" type="button">Load sounds</button>
        </header>
        <section class="song-list" id="songList"></section>
      </aside>

      <section class="board" aria-label="Mixer board">
        <header class="board-header">
          <div>
            <span class="board-label"><i class="live-dot" aria-hidden="true"></i>Now playing</span>
            <strong id="nowPlaying">Nothing</strong>
          </div>
          <div class="board-meta" id="boardMeta"></div>
        </header>

        <div class="mixer-board">
          <div class="channels" id="mixerList"></div>
          <p id="emptyMixer" class="empty-mixer">No active cues</p>

          <div class="master-strip">
            <div class="strip-title">Master</div>
            <div class="fader-shell">
              <div class="fader-track">
                <div class="fader-fill" id="masterFill"></div>
              </div>
              <input id="masterVolume" class="fader-input" type="range" min="0" max="100" value="85" aria-label="Master volume">
            </div>
            <output id="masterOutput" class="strip-output">85</output>
            <div class="strip-unit">dB</div>
          </div>
        </div>
      </section>
    </main>

    <template id="songTemplate">
      <article class="song-row">
        <div class="song-info">
          <strong class="song-title"></strong>
          <span class="song-moment"></span>
        </div>
        <div class="song-actions">
          <button class="play-button" type="button" aria-label="Play">▶ Play</button>
          <div class="song-secondary">
            <button class="fade-in-button" type="button">Fade in</button>
            <button class="loop-button" type="button" aria-pressed="false">Loop</button>
            <button class="fade-button" type="button">Fade out</button>
            <button class="stop-button" type="button">Stop</button>
          </div>
        </div>
      </article>
    </template>

    <template id="mixerTemplate">
      <article class="channel-strip">
        <div class="strip-title"></div>
        <div class="strip-time">0:00 / 0:00</div>
        <div class="strip-meter">
          <div class="strip-meter-fill"></div>
        </div>
        <div class="fader-shell">
          <div class="fader-track">
            <div class="fader-fill"></div>
          </div>
          <input class="fader-input mixer-volume" type="range" min="0" max="100" value="0" aria-label="Channel volume">
        </div>
        <output class="strip-output mixer-output">0</output>
        <div class="strip-unit">dB</div>
        <button class="strip-stop" type="button" aria-label="Stop channel">■</button>
      </article>
    </template>

    <script src="show-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
