<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hamlet Music Board</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Hamlet <span id="version" class="version"></span></p>
        <h1>Music Board</h1>
      </div>
      <button id="stopAll" class="stop-all" type="button">STOP ALL</button>
    </header>

    <main class="page">
      <aside class="cue-panel" aria-label="Cue list">
        <section class="song-list" id="songList"></section>
      </aside>

      <section class="board" aria-label="Mixer board">
        <header class="board-header">
          <div>
            <span class="board-label"><i class="live-dot" aria-hidden="true"></i>Now playing</span>
            <strong id="nowPlaying">Nothing</strong>
          </div>
          <div class="board-meta" id="boardMeta"></div>
        </header>

        <div class="mixer-board">
          <div class="channels" id="mixerList"></div>
          <p id="emptyMixer" class="empty-mixer">No active cues</p>

          <div class="channel-strip master-strip">
            <div class="scribble"><span class="scribble-name">Master</span></div>
            <div class="channel-num">OUT</div>
            <div class="strip-body">
              <div class="vu-meter stereo" aria-hidden="true">
                <div class="vu-col"><div class="vu-fill" id="masterMeterL"></div></div>
                <div class="vu-col"><div class="vu-fill" id="masterMeterR"></div></div>
              </div>
              <div class="fader-shell">
                <div class="fader-track"><div class="fader-fill" id="masterFill"></div></div>
                <input id="masterVolume" class="fader-input" type="range" min="0" max="100" value="85" aria-label="Master volume">
              </div>
              <div class="fader-scale" aria-hidden="true">
                <span>+5</span><span>0</span><span>-10</span><span>-20</span><span>∞</span>
              </div>
            </div>
            <output id="masterOutput" class="strip-readout">85</output>
            <div class="strip-unit">dB</div>
          </div>
        </div>
      </section>
    </main>

    <template id="songTemplate">
      <article class="song-row">
        <div class="song-info">
          <strong class="song-title"></strong>
          <span class="song-moment"></span>
        </div>
        <div class="song-actions">
          <button class="play-button" type="button" aria-label="Play">▶ Play</button>
          <div class="song-secondary">
            <button class="fade-in-button" type="button">Fade in</button>
            <button class="loop-button" type="button" aria-pressed="false">Loop</button>
            <button class="fade-button" type="button">Fade out</button>
            <button class="stop-button" type="button">Stop</button>
          </div>
        </div>
      </article>
    </template>

    <template id="mixerTemplate">
      <article class="channel-strip">
        <div class="scribble"><span class="scribble-name"></span></div>
        <div class="channel-num"></div>
        <div class="strip-body">
          <div class="vu-meter" aria-hidden="true">
            <div class="vu-col"><div class="vu-fill"></div></div>
          </div>
          <div class="fader-shell">
            <div class="fader-track"><div class="fader-fill"></div></div>
            <input class="fader-input" type="range" min="0" max="100" value="0" aria-label="Channel volume">
          </div>
          <div class="fader-scale" aria-hidden="true">
            <span>+5</span><span>0</span><span>-10</span><span>-20</span><span>∞</span>
          </div>
        </div>
        <output class="strip-readout">0</output>
        <div class="strip-unit">dB</div>
        <div class="strip-time">0:00 / 0:00</div>
        <div class="strip-buttons">
          <button class="strip-loop" type="button" aria-pressed="false">↻ LOOP</button>
          <button class="strip-fade" type="button">FADE</button>
          <button class="strip-stop" type="button">STOP</button>
        </div>
      </article>
    </template>

    <script src="show-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
